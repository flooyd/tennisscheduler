<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"></meta>
<meta name="viewport" content="width=device-width, initial-scale=1.0"></meta>
<title>Tennis Scheduler</title>
<link rel="preconnect" href="https://fonts.googleapis.com"></link>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"></link>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet"></link>
<style>
  :root {
    --blue: #4FB3E8;
    --blue-deep: #1B6FA8;
    --blue-pale: #E8F4FB;
    --ball: #DFF24B;
    --ball-deep: #9FB31F;
    --ink: #0C2233;
    --ink-70: rgba(12, 34, 51, 0.7);
    --ink-50: rgba(12, 34, 51, 0.5);
    --line: rgba(12, 34, 51, 0.12);
    --bg: #F0F6F9;
    --card: #FFFFFF;
    --accent: var(--ball);
    --accent-text: var(--ink);
    --radius: 14px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Archivo", "Helvetica Neue", Helvetica, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  .app-root { min-height: 100vh; display: flex; flex-direction: column; }

  .disp {
    font-weight: 850;
    font-style: italic;
    text-transform: uppercase;
    letter-spacing: -0.015em;
    line-height: 0.96;
    margin: 0;
    text-wrap: balance;
  }

  /* ---------- logo ---------- */
  .ts-logo {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-weight: 850;
    font-style: italic;
    text-transform: uppercase;
    letter-spacing: 0.01em;
    font-size: 17px;
    color: var(--ink);
    white-space: nowrap;
  }
  .ts-logo.light { color: #fff; }

  /* ---------- buttons ---------- */
  .btn {
    font-family: inherit;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 13.5px;
    border: 2px solid transparent;
    border-radius: 10px;
    padding: 13px 22px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.15s ease;
    white-space: nowrap;
  }
  .btn:active { transform: translateY(2px); }
  .btn-sm { padding: 9px 14px; font-size: 12px; border-radius: 8px; }
  .btn-primary {
    background: var(--accent);
    color: var(--accent-text);
    box-shadow: 0 3px 0 rgba(12, 34, 51, 0.28);
  }
  .btn-primary:hover { filter: brightness(1.05); }
  .btn-primary:active { box-shadow: 0 1px 0 rgba(12, 34, 51, 0.28); }
  .btn-ink { background: var(--ink); color: #fff; box-shadow: 0 3px 0 rgba(12, 34, 51, 0.2); }
  .btn-ink:hover { background: #16364E; }
  .btn-white { background: #fff; color: var(--ink); box-shadow: 0 3px 0 rgba(12, 34, 51, 0.25); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--line); }
  .btn-ghost:hover { border-color: var(--ink-50); }

  .link {
    font-family: inherit;
    background: none;
    border: none;
    padding: 0;
    font-weight: 700;
    font-size: 14px;
    color: var(--blue-deep);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .link:hover { text-decoration: underline; }
  .back { display: inline-block; margin-bottom: 14px; }

  /* ---------- avatars / badges ---------- */
  .avatar {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-weight: 800;
    font-style: normal;
    letter-spacing: 0.02em;
    flex: none;
    border: 2px solid #fff;
    box-shadow: 0 1px 3px rgba(12, 34, 51, 0.18);
    text-transform: uppercase;
  }
  .avatar.you { border-color: var(--ink); }
  .avatar.open-slot {
    background: transparent;
    color: var(--ink-50);
    border: 2px dashed var(--ink-50);
    box-shadow: none;
    font-weight: 700;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;
  }
  .badge-singles { background: var(--ink); color: #fff; }
  .badge-doubles { background: var(--blue); color: #fff; }
  .badge-you { background: var(--ball); color: var(--ink); }
  .ntrp {
    display: inline-flex;
    align-items: center;
    font-weight: 700;
    font-size: 11.5px;
    letter-spacing: 0.04em;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1.5px solid var(--line);
    color: var(--ink-70);
    background: #fff;
  }

  /* ---------- forms ---------- */
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; flex: 1; }
  .field-label {
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-size: 11px;
    color: var(--ink-70);
  }
  .field-hint { font-size: 12.5px; color: var(--ink-50); }
  input, select, textarea {
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    background: #fff;
    border: 2px solid var(--line);
    border-radius: 10px;
    padding: 11px 13px;
    outline: none;
    transition: border-color 0.12s ease;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--blue); }
  textarea { resize: vertical; }

  .seg {
    display: inline-flex;
    gap: 0;
    background: var(--blue-pale);
    border-radius: 10px;
    padding: 4px;
  }
  .seg button {
    font-family: inherit;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 12px;
    border: none;
    background: transparent;
    color: var(--ink-70);
    padding: 9px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s ease, color 0.12s ease;
  }
  .seg button.on { background: var(--ink); color: #fff; }
  .seg-big { width: 100%; }
  .seg-big button { flex: 1; padding: 13px 16px; font-size: 13px; }

  .check { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; font-size: 13px; color: var(--ink-70); cursor: pointer; white-space: nowrap; }
  .check input { width: 18px; height: 18px; padding: 0; accent-color: var(--blue-deep); }

  /* ---------- nav ---------- */
  .nav {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 28px;
    padding: 0 28px;
    height: 64px;
    background: #fff;
    border-bottom: 2px solid var(--line);
  }
  .nav-logo { background: none; border: none; padding: 0; cursor: pointer; }
  .nav-links { display: flex; gap: 4px; flex: 1; }
  .nav-links button {
    font-family: inherit;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 13px;
    background: none;
    border: none;
    color: var(--ink-50);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: color 0.12s ease, background 0.12s ease;
  }
  .nav-links button:hover { color: var(--ink); }
  .nav-links button.on { color: var(--ink); background: var(--blue-pale); }
  .nav-right { display: flex; align-items: center; gap: 14px; }
  .nav-user { position: relative; }
  .nav-ava { background: none; border: none; padding: 0; cursor: pointer; display: flex; }
  .nav-menu {
    position: absolute;
    right: 0;
    top: 46px;
    background: #fff;
    border: 2px solid var(--line);
    border-radius: 12px;
    box-shadow: 0 10px 28px rgba(12, 34, 51, 0.16);
    min-width: 190px;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .nav-menu-name { font-weight: 800; padding: 8px 10px; display: flex; flex-direction: column; }
  .nav-menu-name span { font-weight: 600; font-size: 12px; color: var(--ink-50); }
  .nav-menu button {
    font-family: inherit;
    font-weight: 700;
    font-size: 13.5px;
    text-align: left;
    background: none;
    border: none;
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--ink);
  }
  .nav-menu button:hover { background: var(--blue-pale); }

  /* ---------- landing ---------- */
  .landing { position: relative; min-height: 100vh; flex: 1; display: flex; }
  .court-bg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .landing-center {
    position: relative;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }
  .sign-card {
    background: #fff;
    border-radius: 18px;
    padding: 36px 36px 28px;
    width: 400px;
    max-width: 100%;
    box-shadow: 0 24px 60px rgba(12, 34, 51, 0.35);
    display: flex;
    flex-direction: column;
  }
  .sign-card .seg { margin: 18px 0; }
  .sign-title { font-size: 44px; margin-top: 18px; }
  .sign-sub { color: var(--ink-70); margin: 8px 0 0; }
  .sign-fine { font-size: 12px; color: var(--ink-50); text-align: center; margin: 14px 0 0; }
  .sign-card.dark {
    background: #10293D;
    color: #fff;
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(223, 242, 75, 0.35);
  }
  .sign-card.dark .sign-title { color: var(--ball); }
  .sign-card.dark .sign-sub { color: rgba(255, 255, 255, 0.75); }
  .sign-card.dark .sign-fine { color: rgba(255, 255, 255, 0.45); }
  .sign-card.dark .field-label { color: rgba(255, 255, 255, 0.65); }
  .sign-card.dark .field-hint { color: rgba(255, 255, 255, 0.45); }
  .sign-card.dark input, .sign-card.dark select {
    background: rgba(255, 255, 255, 0.06);
    border-color: rgba(255, 255, 255, 0.2);
    color: #fff;
  }
  .sign-card.dark input::placeholder { color: rgba(255, 255, 255, 0.35); }
  .sign-card.dark .seg { background: rgba(255, 255, 255, 0.08); }
  .sign-card.dark .seg button { color: rgba(255, 255, 255, 0.6); }
  .sign-card.dark .seg button.on { background: var(--ball); color: var(--ink); }

  .landing-split { display: grid; grid-template-columns: 1.15fr 1fr; }
  .split-left { position: relative; overflow: hidden; display: flex; }
  .split-left-inner {
    position: relative;
    align-self: flex-end;
    padding: 56px;
    color: #fff;
    background: linear-gradient(to top, rgba(12, 34, 51, 0.55), rgba(12, 34, 51, 0));
    width: 100%;
  }
  .split-headline { font-size: clamp(48px, 6vw, 84px); color: #fff; margin-top: 18px; }
  .split-headline::after { content: ""; display: block; width: 92px; height: 10px; background: var(--ball); margin-top: 18px; }
  .split-sub { font-size: 17px; font-weight: 600; color: rgba(255, 255, 255, 0.92); margin: 18px 0 0; }
  .split-right { display: flex; align-items: center; justify-content: center; padding: 48px 32px; background: var(--bg); }
  .split-right .sign-card { box-shadow: 0 16px 44px rgba(12, 34, 51, 0.14); }
  @media (max-width: 900px) {
    .landing-split { grid-template-columns: 1fr; }
    .split-left { min-height: 320px; }
  }

  /* ---------- pages ---------- */
  .page { width: 100%; max-width: 1060px; margin: 0 auto; padding: 32px 28px 80px; flex: 1; }
  .page-narrow { max-width: 720px; }
  .page-title { font-size: 38px; margin-bottom: 22px; }

  .card {
    background: var(--card);
    border: 2px solid var(--line);
    border-radius: var(--radius);
  }

  .card-blue {
    position: relative;
    overflow: hidden;
    border-radius: 20px;
    background: var(--blue);
    color: #fff;
  }
  .hero-court { position: absolute; inset: 0; width: 100%; height: 100%; }
  .hero-inner, .detail-head-inner { position: relative; padding: 44px 44px 40px; }
  .hero-title { font-size: clamp(36px, 4.5vw, 56px); color: #fff; }
  .hero-sub { font-size: 16.5px; font-weight: 600; margin: 12px 0 0; color: rgba(255, 255, 255, 0.95); max-width: 560px; }
  .hero-sub strong { color: var(--ball); font-style: italic; }
  .hero-actions { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }

  .section { margin-top: 36px; }
  .section-head { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; margin-bottom: 14px; }
  .section-title { font-size: 22px; display: flex; align-items: center; gap: 10px; }
  .count-pill {
    font-style: normal;
    font-size: 12px;
    letter-spacing: 0.04em;
    background: var(--blue-pale);
    color: var(--blue-deep);
    border-radius: 999px;
    padding: 3px 10px;
  }

  /* ---------- match cards ---------- */
  .match-list { display: grid; gap: 12px; }
  .match-card {
    font-family: inherit;
    text-align: left;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 20px;
    background: #fff;
    border: 2px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 20px;
    cursor: pointer;
    transition: transform 0.1s ease, border-color 0.1s ease, box-shadow 0.1s ease;
    color: var(--ink);
  }
  .match-card:hover {
    transform: translateY(-2px);
    border-color: var(--blue);
    box-shadow: 0 8px 20px rgba(12, 34, 51, 0.1);
  }
  .mc-date {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--blue-pale);
    border-radius: 12px;
    width: 64px;
    height: 72px;
    font-weight: 800;
    line-height: 1.05;
  }
  .mc-dow { font-size: 10.5px; letter-spacing: 0.1em; color: var(--blue-deep); }
  .mc-day { font-size: 26px; font-style: italic; }
  .mc-mon { font-size: 10.5px; letter-spacing: 0.1em; color: var(--ink-50); }
  .mc-body { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
  .mc-row1 { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .mc-loc { font-weight: 800; font-size: 17px; }
  .mc-meta { font-size: 13.5px; color: var(--ink-70); font-weight: 600; }
  .mc-side { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .slot-dots { display: inline-flex; }
  .slot-dots .avatar { margin-left: -8px; }
  .slot-dots .avatar:first-child { margin-left: 0; }
  .mc-open {
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 11px;
    color: var(--ink);
    background: var(--ball);
    padding: 4px 10px;
    border-radius: 999px;
  }
  .mc-open.full { background: var(--blue-pale); color: var(--ink-50); }

  /* ---------- search ---------- */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    flex-wrap: wrap;
  }
  .filter-sel { width: auto; min-width: 170px; flex: none; }
  .result-count {
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-size: 12px;
    color: var(--ink-50);
    margin: 18px 0 10px;
  }

  /* ---------- match detail ---------- */
  .detail-head { margin-bottom: 8px; }
  .detail-title { font-size: clamp(30px, 4vw, 46px); color: #fff; margin-top: 12px; }
  .detail-sub { font-weight: 600; font-size: 16px; margin: 10px 0 0; color: rgba(255, 255, 255, 0.95); }
  .detail-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 28px; align-items: start; }
  @media (max-width: 860px) { .detail-grid { grid-template-columns: 1fr; } }

  .slot-grid { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
  .slot-card {
    background: #fff;
    border: 2px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    text-align: center;
  }
  .slot-card .avatar { margin-top: 4px; }
  .slot-you { border-color: var(--ball-deep); background: #FCFEEC; }
  .slot-open-card { border-style: dashed; background: transparent; }
  .slot-side {
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 10.5px;
    color: var(--ink-50);
  }
  .slot-name { font-weight: 800; font-size: 15px; }
  .slot-name.muted { color: var(--ink-50); }
  .slot-meta { font-size: 12.5px; color: var(--ink-70); font-weight: 600; }
  .slot-card .btn { margin-top: 8px; }
  .slot-confirm { display: flex; gap: 8px; margin-top: 8px; }
  .slot-confirm .btn { margin-top: 0; }

  .notes { margin-top: 16px; padding: 16px 18px; }
  .notes p { margin: 6px 0 0; color: var(--ink-70); font-weight: 500; }

  .loc-card { overflow: hidden; }
  .loc-map { height: 150px; position: relative; }
  .loc-map svg { width: 100%; height: 100%; display: block; }
  .loc-card-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 3px; }
  .loc-card-body strong { font-size: 16px; }
  .loc-card-body span { font-size: 13.5px; color: var(--ink-70); font-weight: 600; }

  /* ---------- create form ---------- */
  .create-form { display: flex; flex-direction: column; gap: 16px; }
  .form-card { padding: 22px 24px; }
  .form-step {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 850;
    font-style: italic;
    text-transform: uppercase;
    font-size: 16px;
    margin: 0 0 16px;
  }
  .step-num {
    font-style: normal;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--ball);
    font-size: 13px;
  }
  .form-row { display: flex; gap: 14px; }
  .form-hint { font-size: 13.5px; color: var(--ink-70); margin: -6px 0 14px; }
  .form-error {
    font-weight: 700;
    color: #B3261E;
    background: #FDEDEC;
    border: 2px solid #F5C6C2;
    border-radius: 10px;
    padding: 12px 16px;
    margin: 0;
  }
  .form-actions { display: flex; justify-content: flex-end; gap: 12px; }

  .slot-preview { display: flex; align-items: center; gap: 6px; margin-top: 16px; }
  .slot-preview-label { font-size: 13px; font-weight: 700; color: var(--ink-70); margin-left: 8px; }

  .loc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .loc-pick {
    font-family: inherit;
    text-align: left;
    background: #fff;
    border: 2px solid var(--line);
    border-radius: 12px;
    padding: 13px 15px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 2px;
    color: var(--ink);
    transition: border-color 0.1s ease, background 0.1s ease;
  }
  .loc-pick:hover { border-color: var(--blue); }
  .loc-pick.on { border-color: var(--ink); background: var(--blue-pale); box-shadow: inset 0 0 0 1px var(--ink); }
  .loc-pick strong { font-size: 14.5px; }
  .loc-pick span { font-size: 12.5px; color: var(--ink-70); font-weight: 600; }
  .loc-pick .loc-pick-meta { color: var(--ink-50); }
  @media (max-width: 640px) {
    .loc-grid { grid-template-columns: 1fr; }
    .form-row { flex-direction: column; gap: 0; }
  }

  /* ---------- misc ---------- */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-align: center;
    padding: 56px 24px;
    border: 2px dashed var(--line);
    border-radius: var(--radius);
  }
  .empty h3 { font-weight: 850; font-style: italic; text-transform: uppercase; font-size: 20px; margin: 6px 0 0; }
  .empty p { margin: 0 0 10px; color: var(--ink-70); max-width: 380px; }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    padding: 13px 22px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 12px 32px rgba(12, 34, 51, 0.4);
    z-index: 100;
    animation: toast-in 0.25s ease;
  }
  @keyframes toast-in {
    from { opacity: 0; transform: translateX(-50%) translateY(12px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  @media (max-width: 760px) {
    .nav { padding: 0 16px; gap: 14px; }
    .nav-links button { padding: 8px 8px; font-size: 12px; }
    .match-card { grid-template-columns: auto 1fr; }
    .mc-side { grid-column: 1 / -1; flex-direction: row; align-items: center; justify-content: space-between; }
    .hero-inner, .detail-head-inner { padding: 28px 24px; }
    .slot-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>
